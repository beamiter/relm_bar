[package]
name = "relm_bar"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.28"
chrono = "0.4.42"
xbar_core = { git = "https://github.com/beamiter/xbar_core.git" }
shared_structures = { git = "https://github.com/beamiter/shared_structures.git", features = ["use-futex"] }

tracker = "0.2.2"
relm4 = "0.10.0"
relm4-macros = "0.10.0"
relm4-components = "0.10.0"
gtk4 = "0.10.1"
gdk4-x11 = { version = "0.10.1", features = ["xlib"] }
