[package]
name = "relm_bar"
version = "0.1.0"
edition = "2024"

[features]
x11 = ["dep:gdk4-x11"]

[dependencies]
chrono = "0.4.44"
gtk4 = "0.10.3"
gdk4-x11 = { version = "0.10.3", features = ["xlib"], optional = true }
log = "0.4.29"
relm4 = "0.10.0"
shared_structures = { git = "https://github.com/beamiter/shared_structures.git", features = ["use-futex"] }
xbar_core = { git = "https://github.com/beamiter/xbar_core.git" }
